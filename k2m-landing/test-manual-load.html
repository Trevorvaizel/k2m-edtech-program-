<!DOCTYPE html>
<html>
<head>
    <title>Manual Load Test</title>
</head>
<body>
    <h1>Manual Load Test</h1>
    <p>This page should load the app from localhost:5173</p>
    <iframe src="http://localhost:5173/" style="width: 100%; height: 600px; border: 1px solid black;"></iframe>
    <script>
        // Monitor for errors
        window.addEventListener('error', (e) => {
            console.error('Caught error:', e.message);
            document.body.innerHTML += `<div style="color: red; padding: 20px;">ERROR: ${e.message}<br>File: ${e.filename}<br>Line: ${e.lineno}</div>`;
        });
    </script>
</body>
</html>
