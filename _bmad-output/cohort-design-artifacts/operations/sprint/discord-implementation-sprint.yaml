                   errors.push(err.message);
                   sheet.getRange(row, 13).setValue(`âš ï¸ PARTIAL: ${state} - ${errors.join(' | ')}`);
                   logToFacilitatorDashboard(`âš ï¸ PARTIAL: ${firstName} stuck at ${state}`);

                   if (state !== 'db_preloaded') {
