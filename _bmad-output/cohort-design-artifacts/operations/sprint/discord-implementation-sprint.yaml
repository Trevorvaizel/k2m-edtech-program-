    - id: "0.7.2"
      title: "URL parameter cryptographic signing (security fix)"
      status: "pending"
      priority: "P0 - BLOCKER"
      description: |
        CRITICAL FIX #2 â€” Prevent enrollment URL tampering (Amendment A-10).

        VULNERABILITY: Students can modify discord_id in enrollment URL to hijack other enrollments.

        IMPLEMENTATION:
        1. Generate signed params in on_member_join:
           ```python
           import hmac, hashlib

           def generate_signed_params(discord_id, discord_username):
               payload = f"{discord_id}|{discord_username}"
               signature = hmac.new(
                   SECRET_KEY.encode(),
                   payload.encode(),
                   hashlib.sha256
               ).hexdigest()[:16]
               return f"{ENROLL_URL}?data={payload}&sig={signature}"
           ```

        2. Verify in POST /api/enroll:
           ```python
           def verify_signed_params(data, signature):
               expected = hmac.new(
                   SECRET_KEY.encode(),
                   data.encode(),
                   hashlib.sha256
               ).hexdigest()[:16]
               return hmac.compare_digest(expected, signature)
           ```

        3. Reject with error if signature invalid

        SECURITY: SECRET_KEY must be environment variable, never hardcoded
      agent_context:
        load: "source_documents.enrollment_flow_design"
        section: "AMENDMENT A-10"
        also_load: "_bmad-output/cohort-design-artifacts/design-and-architecture/adversarial-pre-mortem-onboarding-journey-2026-03-04.md"
        also_section: "Critical #2: URL Parameter Tampering (Security Hole)"
