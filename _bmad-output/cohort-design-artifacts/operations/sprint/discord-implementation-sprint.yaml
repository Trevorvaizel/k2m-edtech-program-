    - id: "7.11"
      title: "Webhook authentication: HMAC-SHA256 on all Apps Script â†’ bot endpoints"
      status: "done"
      description: |
        DECISION N-03 (Session 4). Apps Script â†’ Railway webhooks are currently unauthenticated.
        An attacker who discovers the URL can trigger role upgrades for arbitrary discord_ids.

        1. Generate WEBHOOK_SECRET (32 bytes, random): store in Railway env var + Apps Script
           Script Properties (Project Settings â†’ Script properties, not in code)
        2. Apps Script: sign all webhook payloads before sending:
           signature = Utilities.computeHmacSha256Signature(payload_json, WEBHOOK_SECRET)
           Add header: X-K2M-Signature: sha256={hex(signature)}
        3. Bot (Flask/aiohttp endpoint): validate before executing:
           received_sig = request.headers.get('X-K2M-Signature')
           expected_sig = hmac.new(WEBHOOK_SECRET, payload_json, sha256).hexdigest()
           if not hmac.compare_digest(received_sig, "sha256=" + expected_sig):
               return 401, "Unauthorized"
        4. Apply to ALL inbound bot webhooks:
           - role upgrade endpoint
           - preload_students endpoint
           - any future Apps Script â†’ bot calls
        5. Log all 401s to #facilitator-dashboard with source IP
      agent_context:
        load: "source_documents.pre_mortem_session_4"
        section: "DECISION N-03"
      acceptance: |
        POST without valid signature returns 401. POST with valid signature executes normally.
