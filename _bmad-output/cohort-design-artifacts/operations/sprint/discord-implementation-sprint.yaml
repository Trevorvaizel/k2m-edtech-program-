    - id: "0.7.7"
      title: "Explicit intent matching for onboarding (fix false advancement)"
      status: "pending"
      priority: "P1 - HIGH"
      description: |
        HIGH PRIORITY FIX #4 â€” Fix false positive advancement (Amendment A-15).

        PROBLEM: Current is_continue_signal() treats ANY short message (â‰¤15 chars) as completion.
        Student asks "Where is it?" (13 chars) â†’ bot advances instead of helping.

        IMPLEMENTATION:
        Replace is_continue_signal() with detect_onboarding_intent():

        ```python
        def detect_onboarding_intent(message_content: str) -> str:
            """Returns: 'complete' | 'skip' | 'help' | 'ambiguous'"""
            content = message_content.lower().strip()

            # Explicit completion signals
            if any(word in content for word in ['done', 'ready', 'finished', 'complete', 'next']):
                return 'complete'

            # Explicit skip signals
            if 'skip' in content:
                return 'skip'

            # Explicit help signals
            if any(word in content for word in ['help', 'confused', 'lost', "don't see", 'where', 'how', '?', '???']):
                return 'help'

            # Ambiguous â€” ask for clarification
            return 'ambiguous'

        async def handle_onboarding_dm(student, message_content: str):
            intent = detect_onboarding_intent(message_content)

            if intent == 'complete':
                await advance_onboarding(student)

            elif intent == 'skip':
                await advance_onboarding(student, skipped=True)

            elif intent == 'help':
                await student.send(
                    "No problem! Let me help.\n\n"
                    "[Contextual help based on current stop]\n\n"
                    "Reply 'done' when you're ready to continue."
                )

            else:  # ambiguous
                await student.send(
                    "I'm not sure if you're ready to continue. "
                    "Reply 'done' to move on, or 'help' if you need assistance."
                )
        ```

        BENEFITS:
        - No false advancement
        - Clear help path
        - Better user experience
      agent_context:
        load: "source_documents.enrollment_flow_design"
        section: "AMENDMENT A-15"
        also_load: "_bmad-output/cohort-design-artifacts/design-and-architecture/adversarial-pre-mortem-onboarding-journey-2026-03-04.md"
        also_section: "High #4: is_continue_signal() Logic is Overly Permissive"
      acceptance: |
        is_continue_signal() replaced with detect_onboarding_intent(). Three paths: complete, skip, help.
        Help messages tested with real user questions. No false advancement in beta testing.

